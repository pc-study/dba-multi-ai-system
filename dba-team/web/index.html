<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBA多AI协作系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#667eea;--primary-dark:#5568d3;--success:#52c41a;--warning:#fa8c16;--danger:#f5222d;--info:#1890ff;--text:#303133;--text-light:#606266;--text-lighter:#909399;--border:#e4e7ed;--bg:#f5f7fa;--white:#fff}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:linear-gradient(180deg,#667eea,#764ba2);color:#fff;padding:20px 0;position:fixed;height:100vh;overflow-y:auto}
.logo{padding:20px 25px;font-size:20px;font-weight:700;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:15px}
.nav-section{padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:10px}
.nav-section-title{padding:8px 25px;font-size:11px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px}
.nav-item{padding:12px 25px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:0.3s;color:rgba(255,255,255,0.8)}
.nav-item:hover{background:rgba(255,255,255,0.1);color:#fff}
.nav-item.active{background:rgba(255,255,255,0.2);color:#fff;border-left:4px solid #fff}
.main{flex:1;margin-left:240px}
.topbar{background:var(--white);padding:15px 30px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.05);position:sticky;top:0;z-index:100}
.topbar h2{font-size:20px;color:var(--text)}
.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;gap:6px;transition:0.3s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-light)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 12px;font-size:13px}
.page{padding:30px;display:none}
.page.active{display:block}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
.stat{background:var(--white);border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.05)}
.stat-value{font-size:32px;font-weight:700;margin-bottom:8px}
.stat-label{color:var(--text-lighter);font-size:14px}
.card{background:var(--white);border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.05);margin-bottom:25px}
.card-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card-title{font-size:16px;font-weight:600}
.card-body{padding:24px}
.db-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.db-card{background:var(--white);border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.05);transition:0.3s;border:2px solid transparent}
.db-card:hover{border-color:var(--primary);transform:translateY(-2px)}
.badge{padding:4px 10px;border-radius:20px;font-size:12px;display:inline-block;font-weight:500}
.badge.success{background:#dcfce7;color:#166534}
.badge.warning{background:#fef3c7;color:#92400e}
.badge.danger{background:#fee2e2;color:#991b1b}
.badge.info{background:#dbeafe;color:#1e40af}
.db-header{display:flex;align-items:center;gap:15px;margin-bottom:15px}
.db-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
.db-icon.oracle{background:#fff7ed}
.db-icon.mysql{background:#eff6ff}
.db-icon.pg{background:#f5f3ff}
.db-icon.redis{background:#fef2f2}
.db-icon.tidb{background:#e0e7ff}
.db-icon.ob{background:#ecfdf5}
.db-name{font-size:16px;font-weight:600;margin-bottom:4px}
.db-version{font-size:13px;color:var(--text-lighter)}
.db-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:15px 0;padding:15px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.metric{text-align:center}
.metric-value{font-size:18px;font-weight:600}
.metric-label{font-size:12px;color:var(--text-lighter)}
.progress-wrap{margin:15px 0}
.progress-label{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px}
.progress{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.progress-bar{height:100%;border-radius:4px;transition:0.3s}
.progress-bar.green{background:var(--success)}
.progress-bar.yellow{background:var(--warning)}
.progress-bar.red{background:var(--danger)}
.db-actions{display:flex;gap:8px}
.chat-container{height:calc(100vh-180px);background:var(--white);border-radius:12px;display:flex;flex-direction:column;overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:20px}
.message{display:flex;gap:12px;margin-bottom:20px;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.message.user{flex-direction:row-reverse}
.message-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.message.ai .message-avatar{background:var(--primary)}
.message.user .message-avatar{background:var(--success)}
.message-content{max-width:70%}
.message-bubble{padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.6;white-space:pre-wrap}
.message.ai .message-bubble{background:var(--bg);border-bottom-left-radius:4px}
.message.user .message-bubble{background:var(--primary);color:#fff;border-bottom-right-radius:4px}
.chat-input-area{padding:20px;border-top:1px solid var(--border);display:flex;gap:12px}
.chat-input{flex:1;padding:12px 16px;border:1px solid var(--border);border-radius:12px;font-size:14px;resize:none;font-family:inherit;max-height:120px}
.chat-input:focus{outline:none;border-color:var(--primary)}
.task-item{display:flex;align-items:center;gap:16px;padding:20px;border-bottom:1px solid var(--border)}
.task-item:last-child{border:none}
.task-priority{width:4px;height:40px;border-radius:2px;flex-shrink:0}
.task-priority.high{background:var(--danger)}
.task-priority.medium{background:var(--warning)}
.task-priority.low{background:var(--success)}
.task-info{flex:1}
.task-title{font-size:15px;font-weight:500;margin-bottom:6px}
.task-meta{font-size:13px;color:var(--text-lighter)}
.alert-item{display:flex;gap:16px;padding:20px;border-radius:12px;margin-bottom:12px}
.alert-item.critical{background:#fef2f2;border-left:4px solid var(--danger)}
.alert-item.warning{background:#fffbeb;border-left:4px solid var(--warning)}
.alert-item.info{background:#eff6ff;border-left:4px solid var(--info)}
.alert-icon{font-size:24px;margin-right:12px}
.alert-content{flex:1}
.alert-title{font-size:15px;font-weight:600;margin-bottom:6px}
.alert-desc{font-size:13px;color:var(--text-light)}
.alert-time{font-size:12px;color:var(--text-lighter)}
.toggle-switch{width:48px;height:26px;background:var(--border);border-radius:13px;position:relative;cursor:pointer;transition:0.3s;flex-shrink:0}
.toggle-switch.active{background:var(--primary)}
.toggle-switch::after{content:'';position:absolute;width:22px;height:22px;background:#fff;border-radius:50%;top:2px;left:2px;transition:0.3s}
.toggle-switch.active::after{transform:translateX(22px)}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:14px;font-weight:500;margin-bottom:8px}
.form-input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:8px;font-size:14px}
.form-input:focus{outline:none;border-color:var(--primary)}
.form-select{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:#fff}
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;padding:14px 16px;background:var(--bg);font-size:13px;font-weight:600;color:var(--text-lighter);border-bottom:1px solid var(--border)}
.table td{padding:16px;border-bottom:1px solid var(--border);font-size:14px}
.table tr:hover{background:#fafafa}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:1000}
.modal.show{display:flex}
.modal-content{background:var(--white);border-radius:16px;padding:30px;width:500px;max-width:95%;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.modal-title{font-size:20px;font-weight:600}
.modal-close{background:none;border:none;font-size:28px;cursor:pointer;color:var(--text-lighter)}
.modal-footer{display:flex;gap:12px;justify-content:flex-end}
.tabs{display:flex;gap:8px;border-bottom:2px solid var(--border);margin-bottom:24px}
.tab{padding:12px 24px;cursor:pointer;color:var(--text-light);border-bottom:2px solid transparent;transition:0.3s;margin-bottom:-2px}
.tab:hover{color:var(--primary)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.quick-actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px}
.quick-action{background:var(--white);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:0.3s;border:2px solid transparent}
.quick-action:hover{border-color:var(--primary);transform:translateY(-4px)}
.quick-action-icon{font-size:32px;margin-bottom:12px}
.quick-action-text{font-size:14px;color:var(--text-light)}
.loading{text-align:center;padding:40px;color:var(--text-lighter)}
@media (max-width:768px){.sidebar{width:60px}.logo{padding:15px;font-size:14px}.nav-section-title{display:none}.nav-item span{display:none}.main{margin-left:60px}.page{padding:15px}}
</style>
</head>
<body>
<div class="app">
<div class="sidebar">
<div class="logo">DBA团队</div>
<div class="nav-section">
<div class="nav-section-title">概览</div>
<div class="nav-item active" data-page="dashboard">仪表盘</div>
<div class="nav-item" data-page="chat">AI对话</div>
</div>
<div class="nav-section">
<div class="nav-section-title">资源</div>
<div class="nav-item" data-page="databases">数据库</div>
<div class="nav-item" data-page="monitor">性能监控</div>
</div>
<div class="nav-section">
<div class="nav-section-title">任务</div>
<div class="nav-item" data-page="tasks">任务中心</div>
<div class="nav-item" data-page="alerts">告警中心</div>
</div>
<div class="nav-section">
<div class="nav-section-title">工具</div>
<div class="nav-item" data-page="sql">SQL工具</div>
</div>
<div class="nav-section">
<div class="nav-section-title">系统</div>
<div class="nav-item" data-page="config">系统配置</div>
</div>
</div>
<div class="main">
<div class="topbar">
<h2 id="pageTitle">仪表盘</h2>
<div style="display:flex;gap:10px">
<button class="btn btn-outline" onclick="loadData()">刷新</button>
</div>
</div>
<!-- Dashboard -->
<div class="page active" id="dashboard">
<div class="stats" id="dashboardStats">
<div class="loading">加载中...</div>
</div>
<div style="display:grid;grid-template-columns:2fr 1fr;gap:25px">
<div class="card">
<div class="card-header"><span class="card-title">运行中任务</span></div>
<div class="card-body" id="runningTasks">
<div class="loading">加载中...</div>
</div>
</div>
<div class="card">
<div class="card-header"><span class="card-title">快捷操作</span></div>
<div class="card-body">
<div class="quick-actions">
<div class="quick-action" onclick="quickAction('inspection')"><div class="quick-action-icon">🔍</div><div class="quick-action-text">执行巡检</div></div>
<div class="quick-action" onclick="quickAction('report')"><div class="quick-action-icon">📊</div><div class="quick-action-text">生成报告</div></div>
<div class="quick-action" onclick="switchPage('sql')"><div class="quick-action-icon">💾</div><div class="quick-action-text">SQL工具</div></div>
<div class="quick-action" onclick="switchPage('chat')"><div class="quick-action-icon">💬</div><div class="quick-action-text">AI问答</div></div>
</div>
</div>
</div>
</div>
<div class="card">
<div class="card-header"><span class="card-title">最新告警</span></div>
<div class="card-body" id="dashboardAlerts">
<div class="loading">加载中...</div>
</div>
</div>
</div>
<!-- Chat -->
<div class="page" id="chat">
<div class="chat-container">
<div class="chat-messages" id="chatMessages">
</div>
<div class="chat-input-area">
<textarea class="chat-input" id="chatInput" placeholder="描述你的数据库需求..." rows="1" onkeypress="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
<button class="btn btn-primary" onclick="sendMessage()">发送</button>
</div>
</div>
</div>
<!-- Databases -->
<div class="page" id="databases">
<div class="card">
<div class="card-header"><span class="card-title">数据库列表</span></div>
<div class="card-body" id="dbList">
<div class="loading">加载中...</div>
</div>
</div>
</div>
<!-- Monitor -->
<div class="page" id="monitor">
<div class="card">
<div class="card-header"><span class="card-title">性能监控</span><button class="btn btn-outline btn-sm" onclick="loadMonitor()">刷新</button></div>
<div class="card-body" id="monitorTable">
<div class="loading">加载中...</div>
</div>
</div>
</div>
<!-- Tasks -->
<div class="page" id="tasks">
<div class="card">
<div class="card-header"><span class="card-title">全部任务</span></div>
<div class="card-body" id="taskList">
<div class="loading">加载中...</div>
</div>
</div>
</div>
<!-- Alerts -->
<div class="page" id="alerts">
<div class="card">
<div class="card-header"><span class="card-title">告警中心</span></div>
<div class="card-body" id="alertList">
<div class="loading">加载中...</div>
</div>
</div>
</div>
<!-- SQL -->
<div class="page" id="sql">
<div class="card">
<div class="card-header"><span class="card-title">SQL工具</span></div>
<div class="card-body">
<div class="form-group"><label class="form-label">选择数据库</label><select class="form-select" id="sqlDb"></select></div>
<div class="form-group"><label class="form-label">SQL语句</label><textarea class="form-input" id="sqlInput" rows="6" placeholder="SELECT * FROM ..."></textarea></div>
<div class="form-group"><label class="form-label">执行结果</label><pre class="form-input" id="sqlResult" style="min-height:150px;white-space:pre-wrap;overflow:auto" placeholder="结果..."></pre></div>
<button class="btn btn-primary" onclick="executeSql()">执行SQL</button>
</div>
</div>
</div>
<!-- Config -->
<div class="page" id="config">
<div class="card">
<div class="card-header"><span class="card-title">系统配置</span><button class="btn btn-primary" onclick="saveConfig()">保存配置</button></div>
<div class="card-body">
<div class="form-group"><label class="form-label">通知设置</label>
<div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)"><span>钉钉通知</span><div class="toggle-switch active" onclick="this.classList.toggle('active')"></div></div>
<div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)"><span>邮件通知</span><div class="toggle-switch active" onclick="this.classList.toggle('active')"></div></div>
<div style="display:flex;justify-content:space-between;padding:12px 0"><span>企业微信</span><div class="toggle-switch" onclick="this.classList.toggle('active')"></div></div>
</div>
</div>
</div>
</div>
</div>
<script>
// API基础URL
const API = '';

// 加载数据
async function loadData() {
  await Promise.all([loadDashboard(), loadTasks(), loadAlerts(), loadDatabases(), loadChatHistory()]);
}

// 加载仪表盘
async function loadDashboard() {
  try {
    const res = await fetch(API + '/api/databases');
    const data = await res.json();
    if (data.success) {
      const dbs = data.data;
      const stats = `
<div class="stat" style="border-left:4px solid #f59e0b"><div class="stat-value">${dbs.filter(d=>d.type==='oracle').length}</div><div class="stat-label">Oracle</div></div>
<div class="stat" style="border-left:4px solid #3b82f6"><div class="stat-value">${dbs.filter(d=>d.type==='mysql').length}</div><div class="stat-label">MySQL</div></div>
<div class="stat" style="border-left:4px solid #8b5cf6"><div class="stat-value">${dbs.filter(d=>d.type==='postgresql').length}</div><div class="stat-label">PostgreSQL</div></div>
<div class="stat" style="border-left:4px solid #ef4444"><div class="stat-value">${dbs.filter(d=>['redis','tidb','oceanbase'].includes(d.type)).length}</div><div class="stat-label">其他</div></div>`;
      document.getElementById('dashboardStats').innerHTML = stats;
    }
  } catch (e) { document.getElementById('dashboardStats').innerHTML = '<div class="loading">加载失败，请启动后端服务</div>'; }
}

// 加载数据库列表
async function loadDatabases() {
  try {
    const res = await fetch(API + '/api/databases');
    const data = await res.json();
    if (data.success) {
      const icons = { oracle:'🐂', mysql:'🐬', postgresql:'🐘', redis:'🔴', tidb:'🐯', oceanbase:'🌊' };
      const html = '<div class="db-grid">' + data.data.map(db => `
<div class="db-card">
<div class="db-header"><div class="db-icon ${db.type}">${icons[db.type]||'📦'}</div><div><div class="db-name">${db.name}</div><div class="db-version">${db.version} · ${db.mode}</div></div></div>
<span class="badge ${db.status==='online'?'success':db.status==='warning'?'warning':'danger'}">${db.status==='online'?'在线':db.status==='warning'?'告警':'离线'}</span>
<div class="db-metrics"><div class="metric"><div class="metric-value">${db.connections}</div><div class="metric-label">连接数</div></div><div class="metric"><div class="metric-value">${db.qps.toLocaleString()}</div><div class="metric-label">QPS</div></div></div>
<div class="progress-wrap"><div class="progress-label"><span>CPU</span><span>${db.cpu}%</span></div><div class="progress"><div class="progress-bar ${db.cpu>80?'red':db.cpu>60?'yellow':'green'}" style="width:${db.cpu}%"></div></div>
<div class="db-actions"><button class="btn btn-outline btn-sm" onclick="testConn('${db.id}')">测试</button><button class="btn btn-outline btn-sm" onclick="showQuery('${db.id}')">查询</button></div>
</div>`).join('') + '</div>';
      document.getElementById('dbList').innerHTML = html;
      
      // 更新SQL工具下拉
      const sqlDbSelect = document.getElementById('sqlDb');
      sqlDbSelect.innerHTML = data.data.map(db => `<option value="${db.id}">${db.name}</option>`).join('');
    }
  } catch (e) { document.getElementById('dbList').innerHTML = '<div class="loading">加载失败</div>'; }
}

// 加载任务
async function loadTasks() {
  try {
    const res = await fetch(API + '/api/tasks');
    const data = await res.json();
    if (data.success) {
      const html = data.data.map(t => `
<div class="task-item"><div class="task-priority ${t.priority}"></div><div class="task-info"><div class="task-title">${t.title}</div><div class="task-meta">${t.expert} · 开始于 ${t.startTime}</div></div><span class="badge ${t.status==='running'?'info':t.status==='done'?'success':'warning'}">${t.status==='running'?'进行中':t.status==='done'?'已完成':'等待中'}</span></div>`).join('');
      document.getElementById('taskList').innerHTML = html || '<div class="loading">暂无任务</div>';
      document.getElementById('runningTasks').innerHTML = html || '<div class="loading">暂无运行中任务</div>';
    }
  } catch (e) { document.getElementById('taskList').innerHTML = '<div class="loading">加载失败</div>'; }
}

// 加载告警
async function loadAlerts() {
  try {
    const res = await fetch(API + '/api/alerts');
    const data = await res.json();
    if (data.success) {
      const icons = { critical:'🔴', warning:'🟡', info:'🔵' };
      const html = data.data.map(a => `
<div class="alert-item ${a.level}"><div class="alert-icon">${icons[a.level]}</div><div class="alert-content"><div class="alert-title">${a.title}</div><div class="alert-desc">${a.desc}</div><div class="alert-time">${a.time} · ${a.db}</div></div></div>`).join('');
      document.getElementById('alertList').innerHTML = html || '<div class="loading">暂无告警</div>';
      document.getElementById('dashboardAlerts').innerHTML = html || '<div class="loading">暂无告警</div>';
    }
  } catch (e) { document.getElementById('alertList').innerHTML = '<div class="loading">加载失败</div>'; }
}

// 加载监控
async function loadMonitor() {
  try {
    const res = await fetch(API + '/api/monitor');
    const data = await res.json();
    if (data.success) {
      const html = `<table class="table"><thead><tr><th>数据库</th><th>QPS</th><th>CPU</th><th>内存</th><th>磁盘</th><th>状态</th></tr></thead><tbody>` + 
        data.data.map(db => `<tr><td>${db.name}</td><td>${db.qps.toLocaleString()}</td><td>${db.cpu}%</td><td>${db.memory}</td><td>${db.disk}</td><td><span class="badge ${db.status==='online'?'success':'warning'}">${db.status==='online'?'正常':'告警'}</span></td></tr>`).join('') + 
        '</tbody></table>';
      document.getElementById('monitorTable').innerHTML = html;
    }
  } catch (e) { document.getElementById('monitorTable').innerHTML = '<div class="loading">加载失败</div>'; }
}

// 加载聊天历史
async function loadChatHistory() {
  try {
    const res = await fetch(API + '/api/chat/history');
    const data = await res.json();
    if (data.success && data.history) {
      const html = data.history.map(m => `<div class="message ${m.role}"><div class="message-avatar"></div><div class="message-content"><div class="message-bubble">${m.content}</div></div></div>`).join('');
      document.getElementById('chatMessages').innerHTML = html;
    }
  } catch (e) { console.log('加载聊天历史失败'); }
}

// 发送消息
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  
  const msgs = document.getElementById('chatMessages');
  msgs.innerHTML += `<div class="message user"><div class="message-avatar"></div><div class="message-content"><div class="message-bubble">${msg}</div></div></div>`;
  input.value = '';
  msgs.scrollTop = msgs.scrollHeight;
  
  try {
    const res = await fetch(API + '/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg})
    });
    const data = await res.json();
    if (data.success) {
      msgs.innerHTML += `<div class="message ai"><div class="message-avatar"></div><div class="message-content"><div class="message-bubble">${data.response}</div></div></div>`;
      msgs.scrollTop = msgs.scrollHeight;
    }
  } catch (e) { alert('发送失败'); }
}

// 显示SQL查询
function showQuery(id) {
  switchPage('sql');
  document.getElementById('sqlDb').value = id;
}

// 执行SQL
async function executeSql() {
  const db = document.getElementById('sqlDb').value;
  const sql = document.getElementById('sqlInput').value.trim();
  if (!sql) { alert('请输入SQL'); return; }
  
  document.getElementById('sqlResult').textContent = '执行中...';
  try {
    const res = await fetch(API + '/api/sql/execute', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({database: db, sql})
    });
    const data = await res.json();
    if (data.success) {
      let result = `执行成功 (${data.executionTime})\n影响行数: ${data.affectedRows}\n\n`;
      if (data.columns) {
        result += data.columns.join(' | ') + '\n' + data.columns.map(()=>'---').join(' | ') + '\n';
        result += data.rows.map(r=>r.join(' | ')).join('\n');
      }
      document.getElementById('sqlResult').textContent = result;
    }
  } catch (e) { document.getElementById('sqlResult').textContent = '执行失败: ' + e.message; }
}

// 页面切换
document.querySelectorAll('.nav-item').forEach(n=>n.addEventListener('click',function(){
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  this.classList.add('active');
  document.getElementById(this.dataset.page).classList.add('active');
  document.getElementById('pageTitle').textContent=this.textContent;
}));
function switchPage(p){
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelector('[data-page="'+p+'"]').classList.add('active');
  document.getElementById(p).classList.add('active');
  document.getElementById('pageTitle').textContent=document.querySelector('[data-page="'+p+'"]').textContent;
}
