<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBA多AI协作系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#667eea;--primary-dark:#5568d3;--success:#52c41a;--warning:#fa8c16;--danger:#f5222d;--info:#1890ff;--text:#303133;--text-light:#606266;--text-lighter:#909399;--border:#e4e7ed;--bg:#f5f7fa;--white:#fff}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:linear-gradient(180deg,#667eea,#764ba2);color:#fff;padding:20px 0;position:fixed;height:100vh;overflow-y:auto}
.logo{padding:20px 25px;font-size:20px;font-weight:700;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:15px}
.nav-section{padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:10px}
.nav-section-title{padding:8px 25px;font-size:11px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px}
.nav-item{padding:12px 25px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:0.3s;color:rgba(255,255,255,0.8)}
.nav-item:hover{background:rgba(255,255,255,0.1);color:#fff}
.nav-item.active{background:rgba(255,255,255,0.2);color:#fff;border-left:4px solid #fff}
.main{flex:1;margin-left:240px}
.topbar{background:var(--white);padding:15px 30px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.05);position:sticky;top:0;z-index:100}
.topbar h2{font-size:20px;color:var(--text)}
.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;gap:6px;transition:0.3s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-light)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-xs{padding:4px 8px;font-size:12px}
.page{padding:30px;display:none}
.page.active{display:block}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
.stat{background:var(--white);border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.05)}
.stat-value{font-size:32px;font-weight:700;margin-bottom:8px}
.stat-label{color:var(--text-lighter);font-size:14px}
.card{background:var(--white);border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.05);margin-bottom:25px}
.card-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card-title{font-size:16px;font-weight:600}
.card-body{padding:24px}
.badge{padding:4px 10px;border-radius:20px;font-size:12px;display:inline-block;font-weight:500}
.badge.success{background:#dcfce7;color:#166534}
.badge.warning{background:#fef3c7;color:#92400e}
.badge.danger{background:#fee2e2;color:#991b1b}
.badge.info{background:#dbeafe;color:#1e40af}
.chat-container{height:calc(100vh-180px);background:var(--white);border-radius:12px;display:flex;flex-direction:column;overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:20px}
.message{display:flex;gap:12px;margin-bottom:20px;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.message.user{flex-direction:row-reverse}
.message-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.message.ai .message-avatar{background:var(--primary)}
.message.user .message-avatar{background:var(--success)}
.message-content{max-width:70%}
.message-bubble{padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.6;white-space:pre-wrap}
.message.ai .message-bubble{background:var(--bg);border-bottom-left-radius:4px}
.message.user .message-bubble{background:var(--primary);color:#fff;border-bottom-right-radius:4px}
.chat-input-area{padding:20px;border-top:1px solid var(--border);display:flex;gap:12px}
.chat-input{flex:1;padding:12px 16px;border:1px solid var(--border);border-radius:12px;font-size:14px;resize:none;font-family:inherit;max-height:120px}
.chat-input:focus{outline:none;border-color:var(--primary)}
.task-item{display:flex;align-items:center;gap:16px;padding:20px;border-bottom:1px solid var(--border)}
.task-item:last-child{border:none}
.task-priority{width:4px;height:40px;border-radius:2px;flex-shrink:0}
.task-priority.high{background:var(--danger)}
.task-priority.medium{background:var(--warning)}
.task-priority.low{background:var(--success)}
.task-info{flex:1}
.task-title{font-size:15px;font-weight:500;margin-bottom:6px}
.task-meta{font-size:13px;color:var(--text-lighter)}
.alert-item{display:flex;gap:16px;padding:20px;border-radius:12px;margin-bottom:12px}
.alert-item.critical{background:#fef2f2;border-left:4px solid var(--danger)}
.alert-item.warning{background:#fffbeb;border-left:4px solid var(--warning)}
.alert-item.info{background:#eff6ff;border-left:4px solid var(--info)}
.alert-icon{font-size:24px;margin-right:12px}
.alert-content{flex:1}
.alert-title{font-size:15px;font-weight:600;margin-bottom:6px}
.alert-desc{font-size:13px;color:var(--text-light)}
.alert-time{font-size:12px;color:var(--text-lighter)}
.toggle-switch{width:48px;height:26px;background:var(--border);border-radius:13px;position:relative;cursor:pointer;transition:0.3s;flex-shrink:0}
.toggle-switch.active{background:var(--primary)}
.toggle-switch::after{content:'';position:absolute;width:22px;height:22px;background:#fff;border-radius:50%;top:2px;left:2px;transition:0.3s}
.toggle-switch.active::after{transform:translateX(22px)}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:14px;font-weight:500;margin-bottom:8px}
.form-input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:8px;font-size:14px}
.form-input:focus{outline:none;border-color:var(--primary)}
.form-select{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:#fff}
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;padding:14px 16px;background:var(--bg);font-size:13px;font-weight:600;color:var(--text-lighter);border-bottom:1px solid var(--border)}
.table td{padding:16px;border-bottom:1px solid var(--border);font-size:14px}
.table tr:hover{background:#fafafa}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:1000}
.modal.show{display:flex}
.modal-content{background:var(--white);border-radius:16px;padding:30px;width:500px;max-width:95%;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.modal-title{font-size:20px;font-weight:600}
.modal-close{background:none;border:none;font-size:28px;cursor:pointer;color:var(--text-lighter)}
.modal-footer{display:flex;gap:12px;justify-content:flex-end}
.quick-actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px}
.quick-action{background:var(--white);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:0.3s;border:2px solid transparent}
.quick-action:hover{border-color:var(--primary);transform:translateY(-4px)}
.quick-action-icon{font-size:32px;margin-bottom:12px}
.quick-action-text{font-size:14px;color:var(--text-light)}
.loading{text-align:center;padding:40px;color:var(--text-lighter)}
.db-table{width:100%}
.db-table th{text-align:left;padding:16px;background:var(--bg);font-size:13px;font-weight:600;color:var(--text-lighter);border-bottom:2px solid var(--border)}
.db-table td{padding:16px;border-bottom:1px solid var(--border);vertical-align:middle}
.db-table tr:hover{background:#fafafa}
.db-name-cell{display:flex;align-items:center;gap:12px}
.db-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.db-icon.oracle{background:#fff7ed}
.db-icon.mysql{background:#eff6ff}
.db-icon.pg{background:#f5f3ff}
.db-icon.redis{background:#fef2f2}
.db-icon.tidb{background:#e0e7ff}
.db-name-text{font-weight:600;font-size:15px}
.db-version-text{font-size:12px;color:var(--text-lighter)}
.metric-bar{width:80px;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:8px}
.metric-bar-fill{height:100%;border-radius:3px}
.metric-bar-fill.green{background:var(--success)}
.metric-bar-fill.yellow{background:var(--warning)}
.metric-bar-fill.red{background:var(--danger)}
.action-btns{display:flex;gap:6px}
.toast{position:fixed;bottom:30px;right:30px;background:var(--text);color:#fff;padding:16px 24px;border-radius:8px;z-index:2000;display:none}
.toast.show{display:block}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}
@media (max-width:768px){.sidebar{width:60px}.logo{padding:15px;font-size:14px}.nav-section-title{display:none}.nav-item span{display:none}.main{margin-left:60px}.page{padding:15px}}
</style>
</head>
<body>
<div class="app">
<div class="sidebar">
<div class="logo">DBA团队</div>
<div class="nav-section"><div class="nav-section-title">概览</div>
<div class="nav-item active" data-page="dashboard">仪表盘</div>
<div class="nav-item" data-page="chat">AI对话</div>
</div>
<div class="nav-section"><div class="nav-section-title">资源</div>
<div class="nav-item" data-page="databases">数据库</div>
<div class="nav-item" data-page="monitor">性能监控</div>
</div>
<div class="nav-section"><div class="nav-section-title">任务</div>
<div class="nav-item" data-page="tasks">任务中心</div>
<div class="nav-item" data-page="alerts">告警中心</div>
</div>
<div class="nav-section"><div class="nav-section-title">工具</div>
<div class="nav-item" data-page="sql">SQL工具</div>
</div>
</div>
<div class="main">
<div class="topbar"><h2 id="pageTitle">仪表盘</h2><button class="btn btn-outline" onclick="loadData()">刷新</button></div>
<div class="page active" id="dashboard">
<div class="stats" id="dashboardStats"><div class="loading">加载中...</div></div>
<div style="display:grid;grid-template-columns:2fr 1fr;gap:25px">
<div class="card"><div class="card-header"><span class="card-title">运行中任务</span></div>
<div class="card-body" id="runningTasks"><div class="loading">加载中...</div></div></div>
<div class="card"><div class="card-header"><span class="card-title">快捷操作</span></div>
<div class="card-body"><div class="quick-actions">
<div class="quick-action" onclick="quickAction('inspection')"><div class="quick-action-icon">🔍</div><div class="quick-action-text">执行巡检</div></div>
<div class="quick-action" onclick="quickAction('report')"><div class="quick-action-icon">📊</div><div class="quick-action-text">生成报告</div></div>
<div class="quick-action" onclick="switchPage('sql')"><div class="quick-action-icon">💾</div><div class="quick-action-text">SQL工具</div></div>
<div class="quick-action" onclick="switchPage('chat')"><div class="quick-action-icon">💬</div><div class="quick-action-text">AI问答</div></div>
</div></div></div></div>
<div class="card"><div class="card-header"><span class="card-title">最新告警</span></div>
<div class="card-body" id="dashboardAlerts"><div class="loading">加载中...</div></div></div>
</div>
<div class="page" id="chat">
<div class="chat-container">
<div class="chat-messages" id="chatMessages"></div>
<div class="chat-input-area">
<textarea class="chat-input" id="chatInput" placeholder="描述你的数据库需求..." rows="1" onkeypress="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
<button class="btn btn-primary" onclick="sendMessage()">发送</button>
</div></div></div>
<div class="page" id="databases">
<div class="card">
<div class="card-header">
<span class="card-title">数据库列表</span>
<div style="display:flex;gap:10px;align-items:center">
<input type="text" class="form-input" id="dbSearch" placeholder="搜索..." style="width:180px;padding:8px 12px" onkeyup="filterDb()">
<button class="btn btn-primary btn-sm" onclick="showDbModal()">+ 添加数据库</button>
</div></div>
<div class="card-body" style="padding:0">
<table class="db-table"><thead><tr><th>数据库</th><th>IP:Port</th><th>状态</th><th>连接</th><th>QPS</th><th>CPU</th><th>操作</th></tr></thead>
<tbody id="dbTableBody"><tr><td colspan="7" class="loading">加载中...</td></tr></tbody></table>
</div></div></div>
<div class="page" id="monitor">
<div class="card"><div class="card-header"><span class="card-title">性能监控</span><button class="btn btn-outline btn-sm" onclick="loadMonitor()">刷新</button></div>
<div class="card-body" id="monitorTable"><div class="loading">加载中...</div></div></div></div>
<div class="page" id="tasks">
<div class="card"><div class="card-header"><span class="card-title">全部任务</span></div>
<div class="card-body" id="taskList"><div class="loading">加载中...</div></div></div></div>
<div class="page" id="alerts">
<div class="card"><div class="card-header"><span class="card-title">告警中心</span></div>
<div class="card-body" id="alertList"><div class="loading">加载中...</div></div></div></div>
<div class="page" id="sql">
<div class="card"><div class="card-header"><span class="card-title">SQL工具</span></div>
<div class="card-body">
<div class="form-group"><label class="form-label">数据库</label><select class="form-select" id="sqlDb"></select></div>
<div class="form-group"><label class="form-label">SQL</label><textarea class="form-input" id="sqlInput" rows="6" placeholder="SELECT * FROM ..."></textarea></div>
<div class="form-group"><label class="form-label">结果</label><pre class="form-input" id="sqlResult" style="min-height:150px;white-space:pre-wrap;overflow:auto"></pre></div>
<button class="btn btn-primary" onclick="executeSql()">执行</button>
</div></div></div>
</div>
</div>
<!-- DB Modal -->
<div class="modal" id="dbModal">
<div class="modal-content">
<div class="modal-header"><h3 class="modal-title" id="dbModalTitle">添加数据库</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
<div class="modal-body">
<input type="hidden" id="editDbId">
<div class="form-group"><label class="form-label">类型</label><select class="form-select" id="dbType"><option value="mysql">MySQL</option><option value="postgresql">PostgreSQL</option><option value="oracle">Oracle</option><option value="redis">Redis</option></select></div>
<div class="form-group"><label class="form-label">名称</label><input type="text" class="form-input" id="dbName" placeholder="MySQL生产库"></div>
<div class="form-group"><label class="form-label">主机IP</label><input type="text" class="form-input" id="dbHost" placeholder="192.168.1.100"></div>
<div class="form-group"><label class="form-label">端口</label><input type="text" class="form-input" id="dbPort" placeholder="3306"></div>
<div class="form-group"><label class="form-label">用户名</label><input type="text" class="form-input" id="dbUser" placeholder="root"></div>
<div class="form-group"><label class="form-label">密码</label><input type="password" class="form-input" id="dbPass" placeholder="留空则不修改"></div>
<div class="form-group"><label class="form-label">数据库名</label><input type="text" class="form-input" id="dbName2" placeholder="mysql"></div>
</div>
<div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveDb()">保存</button></div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
const API = '';
let allDatabases = [];

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function loadData() {
  await Promise.all([loadDashboard(), loadTasks(), loadAlerts(), loadDatabases(), loadChatHistory()]);
}

async function loadDashboard() {
  try {
    const res = await fetch(API + '/api/databases');
    const data = await res.json();
    if (data.success) {
      const dbs = data.data;
      document.getElementById('dashboardStats').innerHTML = `<div class="stat" style="border-left:4px solid #f59e0b"><div class="stat-value">${dbs.filter(d=>d.type==='oracle').length}</div><div class="stat-label">Oracle</div></div><div class="stat" style="border-left:4px solid #3b82f6"><div class="stat-value">${dbs.filter(d=>d.type==='mysql').length}</div><div class="stat-label">MySQL</div></div><div class="stat" style="border-left:4px solid #8b5cf6"><div class="stat-value">${dbs.filter(d=>d.type==='postgresql').length}</div><div class="stat-label">PostgreSQL</div></div><div class="stat" style="border-left:4px solid #ef4444"><div class="stat-value">${dbs.filter(d=>['redis'].includes(d.type)).length}</div><div class="stat-label">Redis</div></div>`;
    }
  } catch (e) { document.getElementById('dashboardStats').innerHTML = '<div class="loading">加载失败</div>'; }
}

async function loadDatabases() {
  try {
    const res = await fetch(API + '/api/databases');
    const data = await res.json();
    if (data.success) {
      allDatabases = data.data;
      renderDbTable(allDatabases);
      document.getElementById('sqlDb').innerHTML = data.data.map(db => `<option value="${db.id}">${db.name}</option>`).join('');
    }
  } catch (e) { document.getElementById('dbTableBody').innerHTML = '<tr><td colspan="7" class="loading">加载失败</td></tr>'; }
}

function renderDbTable(dbs) {
  const icons = { oracle:'🐂', mysql:'🐬', postgresql:'🐘', redis:'🔴' };
  const tbody = document.getElementById('dbTableBody');
  if (!dbs.length) { tbody.innerHTML = '<tr><td colspan="7" class="loading">暂无数据</td></tr>'; return; }
  tbody.innerHTML = dbs.map(db => {
    const cpuClass = (db.cpu||0) > 80 ? 'red' : (db.cpu||0) > 60 ? 'yellow' : 'green';
    return `<tr><td><div class="db-name-cell"><div class="db-icon ${db.type}">${icons[db.type]||'📦'}</div><div><div class="db-name-text">${db.name}</div><div class="db-version-text">${db.version||''} ${db.mode||''}</div></div></div></td><td>${db.ip}:${db.port}</td><td><span class="badge ${db.status==='online'?'success':db.status==='warning'?'warning':'danger'}">${db.status==='online'?'在线':db.status==='warning'?'告警':'离线'}</span></td><td>${db.connections||'-'}</td><td>${(db.qps||0).toLocaleString()}</td><td><span class="metric-bar"><span class="metric-bar-fill ${cpuClass}" style="width:${db.cpu||0}%"></span></span>${db.cpu||0}%</td><td><div class="action-btns"><button class="btn btn-outline btn-xs" onclick="testConn('${db.id}')">测试</button><button class="btn btn-outline btn-xs" onclick="editDb('${db.id}')">编辑</button><button class="btn btn-outline btn-xs" onclick="deleteDb('${db.id}')">删除</button></div></td></tr>`;
  }).join('');
}

function filterDb() {
  const kw = document.getElementById('dbSearch').value.toLowerCase();
  renderDbTable(allDatabases.filter(db => (db.name||'').toLowerCase().includes(kw) || (db.type||'').toLowerCase().includes(kw)));
}

function showDbModal(id=null) {
  document.getElementById('dbModal').classList.add('show');
  if (id) {
    const db = allDatabases.find(d => d.id === id);
    document.getElementById('dbModalTitle').textContent = '编辑数据库';
    document.getElementById('editDbId').value = id;
    document.getElementById('dbType').value = db.type;
    document.getElementById('dbName').value = db.name;
    document.getElementById('dbHost').value = db.ip;
    document.getElementById('dbPort').value = db.port;
    document.getElementById('dbUser').value = db.user || '';
    document.getElementById('dbPass').value = '';
    document.getElementById('dbName2').value = db.database || '';
  } else {
    document.getElementById('dbModalTitle').textContent = '添加数据库';
    document.getElementById('editDbId').value = '';
    document.getElementById('dbType').value = 'mysql';
    document.getElementById('dbName').value = '';
    document.getElementById('dbHost').value = '';
    document.getElementById('dbPort').value = '3306';
    document.getElementById('dbUser').value = 'root';
    document.getElementById('dbPass').value = '';
    document.getElementById('dbName2').value = '';
  }
}

function editDb(id) { showDbModal(id); }

async function saveDb() {
  const id = document.getElementById('editDbId').value;
  const db = {
    id: id || 'db_' + Date.now(),
    type: document.getElementById('dbType').value,
    name: document.getElementById('dbName').value,
    ip: document.getElementById('dbHost').value,
    port: parseInt(document.getElementById('dbPort').value),
    user: document.getElementById('dbUser').value,
    password: document.getElementById('dbPass').value,
    database: document.getElementById('dbName2').value,
    status: 'offline'
  };
  if (!db.name || !db.ip) { showToast('请填写名称和IP', 'error'); return; }
  
  try {
    const res = await fetch(API + '/api/db/save', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(db)
    });
    const data = await res.json();
    if (data.success) {
      showToast('保存成功');
      closeModal();
      loadDatabases();
    } else {
      showToast(data.message || '保存失败', 'error');
    }
  } catch (e) { showToast('保存失败: ' + e.message, 'error'); }
}

async function deleteDb(id) {
  if (!confirm('确定删除该数据库？')) return;
  try {
    const res = await fetch(API + '/api/db/delete?id=' + id, {method:'DELETE'});
    const data = await res.json();
    if (data.success) { showToast('删除成功'); loadDatabases(); }
    else { showToast(data.message || '删除失败', 'error'); }
  } catch (e) { showToast('删除失败', 'error'); }
}

async function loadTasks() {
  try {
    const res = await fetch(API + '/api/tasks');
    const data = await res.json();
    if (data.success) {
      const html = data.data.map(t => `<div class="task-item"><div class="task-priority ${t.priority}"></div><div class="task-info"><div class="task-title">${t.title}</div><div class="task-meta">${t.expert} · ${t.startTime}</div></div><span class="badge ${t.status==='running'?'info':t.status==='done'?'success':'warning'}">${t.status==='running'?'进行中':t.status==='done'?'已完成':'等待中'}</span></div>`).join('');
      document.getElementById('taskList').innerHTML = html || '<div class="loading">暂无任务</div>';
      document.getElementById('runningTasks').innerHTML = html || '<div class="loading">无运行中</div>';
    }
  } catch (e) {}
}

async function loadAlerts() {
  try {
    const res = await fetch(API + '/api/alerts');
    const data = await res.json();
    if (data.success) {
      const icons = { critical:'🔴', warning:'🟡', info:'🔵' };
      const html = data.data.map(a => `<div class="alert-item ${a.level}"><div class="alert-icon">${icons[a.level]}</div><div class="alert-content"><div class="alert-title">${a.title}</div><div class="alert-desc">${a.desc}</div><div class="alert-time">${a.time||''} · ${a.db||''}</div></div></div>`).join('');
      document.getElementById('alertList').innerHTML = html || '<div class="loading">无告警</div>';
      document.getElementById('dashboardAlerts').innerHTML = html || '<div class="loading">无告警</div>';
    }
  } catch (e) {}
}

async function loadMonitor() {
  try {
    const res = await fetch(API + '/api/monitor');
    const data = await res.json();
    if (data.success) {
      document.getElementById('monitorTable').innerHTML = `<table class="table"><thead><tr><th>数据库</th><th>QPS</th><th>CPU</th><th>状态</th></tr></thead><tbody>` + data.data.map(db => `<tr><td>${db.name}</td><td>${(db.qps||0).toLocaleString()}</td><td>${db.cpu||0}%</td><td><span class="badge ${db.status==='online'?'success':'warning'}">${db.status==='online'?'正常':'告警'}</span></td></tr>`).join('') + '</tbody></table>';
    }
  } catch (e) {}
}

async function loadChatHistory() {
  try {
    const res = await fetch(API + '/api/chat/history');
    const data = await res.json();
    if (data.success && data.history) document.getElementById('chatMessages').innerHTML = data.history.map(m => `<div class="message ${m.role}"><div class="message-avatar"></div><div class="message-content"><div class="message-bubble">${m.content}</div></div></div>`).join('');
  } catch (e) {}
}

async function sendMessage() {
  const msg = document.getElementById('chatInput').value.trim();
  if (!msg) return;
  const msgs = document.getElementById('chatMessages');
  msgs.innerHTML += `<div class="message user"><div class="message-avatar"></div><div class="message-content"><div class="message-bubble">${msg}</div></div></div>`;
  document.getElementById('chatInput').value = '';
  msgs.scrollTop = msgs.scrollHeight;
  try {
    const res = await fetch(API + '/api/chat', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    const data = await res.json();
    if (data.success) msgs.innerHTML += `<div class="message ai"><div class="message-avatar"></div><div class="message-content"><div class="message-bubble">${data.response}</div></div></div>`;
    msgs.scrollTop = msgs.scrollHeight;
  } catch (e) {}
}

async function testConn(id) {
  const res = await fetch(API + '/api/test?id=' + id);
  const data = await res.json();
  showToast(data.message, data.success ? 'success' : 'error');
}

async function executeSql() {
  const db = document.getElementById('sqlDb').value;
  const sql = document.getElementById('sqlInput').value.trim();
  if (!sql) return showToast('请输入SQL', 'error');
  document.getElementById('sqlResult').textContent = '执行中...';
  try {
    const res = await fetch(API + '/api/sql/execute', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({database:db,sql})});
    const data = await res.json();
    if (data.success) {
      let r = `成功 (${data.executionTime})\n数据库: ${data.database}\n\n`;
      if (data.columns) r += data.columns.join(' | ') + '\n' + data.columns.map(()=>'---').join(' | ') + '\n' + data.rows.map(r=>r.join(' | ')).join('\n');
      document.getElementById('sqlResult').textContent = r;
    } else { document.getElementById('sqlResult').textContent = '失败: ' + data.message; }
  } catch (e) { document.getElementById('sqlResult').textContent = '失败: ' + e.message; }
}

document.querySelectorAll('.nav-item').forEach(n=>n.addEventListener('click',function(){
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  this.classList.add('active');
  document.getElementById(this.dataset.page).classList.add('active');
  document.getElementById('pageTitle').textContent=this.textContent;
}));

function switchPage(p){
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelector('[data-page="'+p+'"]').classList.add('active');
  document.getElementById(p).classList.add('active');
  document.getElementById('pageTitle').textContent=document.querySelector('[data-page="'+p+'"]').textContent;
}

function closeModal(){document.querySelectorAll('.modal').forEach(m=>m.classList.remove('show'));}
function quickAction(t){showToast(t==='inspection'?'正在巡检...':'正在生成报告...');}
loadData();loadMonitor();
</script>
</body>
</html>
